name: CI Checks
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout out the repository to the runner
        uses: actions/checkout@v4
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        uses: py-actions/py-dependency-install@v4
        with:
          path: "requirements-dev.txt"
      - name: Run linter
        run: python3 -m ruff check app/ tests/
      - name: Run tests
        run: python3 -m pytest -v
  security-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout out the repository to the runner
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan git secrets
        uses: gitleaks/gitleaks-action@v2

  semgrep:
    name: semgrep (container)
    runs-on: ubuntu-latest
    needs:
      - lint-and-test
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout out the repository to the runner
        uses: actions/checkout@v4

      - name: Run semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/python \
            --metrics=off \
            --error
